<svg viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="1200" height="560" fill="#F9FAFB"/>

  <!-- Labels -->
  <text x="300" y="48" font-size="13" font-weight="700" fill="#2A9D8F" text-anchor="middle" letter-spacing="0.5">QUICK SETUP</text>
  <text x="300" y="66" font-size="12" fill="#4F5D75" text-anchor="middle">Move fast · Trust the defaults</text>

  <text x="870" y="48" font-size="13" font-weight="700" fill="#4F5D75" text-anchor="middle" letter-spacing="0.5">ADVANCED</text>
  <text x="870" y="66" font-size="12" fill="#4F5D75" text-anchor="middle">Full control · Deep configuration</text>

  <!-- Divider -->
  <line x1="590" y1="32" x2="590" y2="540" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="552" y="240" width="76" height="28" rx="14" fill="#E5E7EB"/>
  <text x="590" y="258" font-size="11" font-weight="600" fill="#4F5D75" text-anchor="middle">switch</text>

  <!-- ── QUICK SETUP (left) ── -->
  <!-- Mode toggle -->
  <rect x="100" y="88" width="380" height="44" rx="10" fill="#F3F4F6"/>
  <rect x="104" y="92" width="180" height="36" rx="8" fill="#2A9D8F"/>
  <text x="194" y="114" font-size="13" font-weight="600" fill="white" text-anchor="middle">Quick Setup</text>
  <text x="394" y="114" font-size="13" fill="#9CA3AF" text-anchor="middle">Advanced</text>

  <!-- 3 Required Fields only -->
  <text x="100" y="164" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">3 REQUIRED FIELDS</text>

  <text x="100" y="192" font-size="12" font-weight="600" fill="#1F2D3D">Cloud Provider</text>
  <rect x="100" y="200" width="380" height="40" rx="8" fill="white" stroke="#2A9D8F" stroke-width="1.5"/>
  <text x="120" y="224" font-size="13" fill="#1F2D3D">AWS  ✓</text>

  <text x="100" y="268" font-size="12" font-weight="600" fill="#1F2D3D">Region</text>
  <rect x="100" y="276" width="380" height="40" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="120" y="300" font-size="13" fill="#9CA3AF">us-east-1 (N. Virginia)</text>
  <text x="462" y="300" font-size="16" fill="#9CA3AF">⌄</text>

  <text x="100" y="344" font-size="12" font-weight="600" fill="#1F2D3D">Cluster Name</text>
  <rect x="100" y="352" width="380" height="40" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="120" y="376" font-size="13" fill="#9CA3AF">my-cluster</text>

  <!-- Defaults info callout -->
  <rect x="100" y="416" width="380" height="60" rx="10" fill="#E0F5F2"/>
  <text x="124" y="440" font-size="12" font-weight="600" fill="#2A9D8F">Defaults are safe for production</text>
  <text x="124" y="458" font-size="11" fill="#2A9D8F">Replication · Node sizing · Network policies</text>
  <text x="124" y="473" font-size="11" fill="#2A9D8F">validated by Aerospike engineers.</text>

  <!-- Launch button -->
  <rect x="100" y="496" width="380" height="44" rx="10" fill="#2A9D8F"/>
  <text x="290" y="522" font-size="14" font-weight="600" fill="white" text-anchor="middle">Launch Cluster →</text>

  <!-- ── ADVANCED (right) ── -->
  <!-- Mode toggle -->
  <rect x="680" y="88" width="420" height="44" rx="10" fill="#F3F4F6"/>
  <text x="780" y="114" font-size="13" fill="#9CA3AF" text-anchor="middle">Quick Setup</text>
  <rect x="896" y="92" width="200" height="36" rx="8" fill="#4F5D75"/>
  <text x="996" y="114" font-size="13" font-weight="600" fill="white" text-anchor="middle">Advanced</text>

  <!-- More fields label -->
  <text x="680" y="164" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">ALL CONFIGURATION EXPOSED</text>

  <text x="680" y="192" font-size="12" font-weight="600" fill="#1F2D3D">Cloud Provider</text>
  <rect x="680" y="200" width="200" height="40" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="700" y="224" font-size="13" fill="#1F2D3D">AWS</text>

  <text x="896" y="192" font-size="12" font-weight="600" fill="#1F2D3D">Region</text>
  <rect x="896" y="200" width="200" height="40" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="916" y="224" font-size="13" fill="#9CA3AF">us-east-1</text>

  <text x="680" y="268" font-size="12" font-weight="600" fill="#1F2D3D">Node Type</text>
  <rect x="680" y="276" width="200" height="40" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="700" y="300" font-size="13" fill="#1F2D3D">c5.2xlarge</text>

  <text x="896" y="268" font-size="12" font-weight="600" fill="#1F2D3D">Node Count</text>
  <rect x="896" y="276" width="200" height="40" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="916" y="300" font-size="13" fill="#1F2D3D">3</text>

  <text x="680" y="344" font-size="12" font-weight="600" fill="#1F2D3D">Replication Factor</text>
  <rect x="680" y="352" width="200" height="40" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="700" y="376" font-size="13" fill="#1F2D3D">2</text>

  <text x="896" y="344" font-size="12" font-weight="600" fill="#1F2D3D">Rack Awareness</text>
  <rect x="896" y="352" width="200" height="40" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="916" y="376" font-size="13" fill="#9CA3AF">Disabled</text>

  <!-- JSON/YAML toggle -->
  <rect x="680" y="412" width="420" height="80" rx="10" fill="#1F2D3D"/>
  <text x="700" y="432" font-size="11" font-weight="600" fill="#6B7A8D">aerospike.conf (JSON)</text>
  <text x="700" y="452" font-size="11" fill="#2A9D8F" xml:space="preserve">  "namespace": "test",</text>
  <text x="700" y="468" font-size="11" fill="#9CA3AF" xml:space="preserve">  "replication-factor": 2,</text>
  <text x="700" y="484" font-size="11" fill="#F57C00" xml:space="preserve">  "memory-size": "8G"</text>

  <!-- Launch button -->
  <rect x="680" y="512" width="420" height="28" rx="8" fill="#4F5D75"/>
  <text x="890" y="530" font-size="13" font-weight="600" fill="white" text-anchor="middle">Review Configuration →</text>
</svg>
