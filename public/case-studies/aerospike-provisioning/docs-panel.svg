<svg viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="1200" height="560" fill="#F9FAFB"/>

  <!-- Label -->
  <text x="600" y="40" font-size="12" font-weight="600" fill="#9CA3AF" text-anchor="middle" letter-spacing="1.5">CONTEXTUAL DOCUMENTATION — GUIDANCE ALONGSIDE DECISIONS</text>

  <!-- Config form panel -->
  <rect x="60" y="60" width="680" height="480" rx="16" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="100" y="104" font-size="18" font-weight="700" fill="#1F2D3D">Network Configuration</text>
  <text x="100" y="124" font-size="13" fill="#4F5D75">Define how your cluster communicates. You can use defaults or bring your own VPC.</text>

  <!-- VPC Toggle -->
  <text x="100" y="164" font-size="12" font-weight="600" fill="#1F2D3D">VPC Configuration</text>
  <rect x="100" y="172" width="580" height="44" rx="10" fill="#F3F4F6"/>
  <rect x="104" y="176" width="276" height="36" rx="8" fill="#2A9D8F"/>
  <text x="242" y="198" font-size="13" font-weight="600" fill="white" text-anchor="middle">Aerospike-managed VPC</text>
  <text x="520" y="198" font-size="13" fill="#9CA3AF" text-anchor="middle">Bring your own VPC</text>

  <!-- CIDR field — highlighted because the user is on this field -->
  <text x="100" y="244" font-size="12" font-weight="600" fill="#1F2D3D">CIDR Block</text>
  <rect x="100" y="252" width="580" height="44" rx="8" fill="white" stroke="#2A9D8F" stroke-width="2"/>
  <text x="120" y="278" font-size="13" fill="#1F2D3D">10.0.0.0/16</text>
  <!-- Highlight indicator -->
  <rect x="100" y="252" width="3" height="44" rx="1" fill="#2A9D8F"/>

  <!-- Port config -->
  <text x="100" y="328" font-size="12" font-weight="600" fill="#1F2D3D">Service Port</text>
  <rect x="100" y="336" width="270" height="44" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="120" y="362" font-size="13" fill="#9CA3AF">3000 (default)</text>

  <text x="390" y="328" font-size="12" font-weight="600" fill="#1F2D3D">Fabric Port</text>
  <rect x="390" y="336" width="290" height="44" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="410" y="362" font-size="13" fill="#9CA3AF">3001 (default)</text>

  <!-- Security groups -->
  <text x="100" y="412" font-size="12" font-weight="600" fill="#1F2D3D">Security Group Rules</text>
  <rect x="100" y="420" width="580" height="36" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="120" y="442" font-size="12" fill="#4F5D75">Inbound: port 3000 from  0.0.0.0/0 · Outbound: all</text>

  <rect x="100" y="462" width="580" height="36" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="120" y="484" font-size="12" fill="#9CA3AF">+ Add custom rule</text>

  <!-- ── Docs panel ── -->
  <rect x="764" y="60" width="380" height="480" rx="16" fill="#F9FAFB" stroke="#E0F5F2" stroke-width="2"/>
  <rect x="764" y="60" width="380" height="48" rx="16" fill="#E0F5F2"/>
  <rect x="764" y="92" width="380" height="16" fill="#E0F5F2"/>
  <text x="954" y="88" font-size="11" font-weight="600" fill="#2A9D8F" text-anchor="middle" letter-spacing="1">CONTEXTUAL DOCS</text>

  <!-- Highlighted: CIDR Block explanation -->
  <rect x="784" y="126" width="340" height="110" rx="10" fill="white" stroke="#2A9D8F" stroke-width="1.5"/>
  <text x="804" y="150" font-size="13" font-weight="700" fill="#2A9D8F">CIDR Block</text>
  <text x="804" y="170" font-size="12" fill="#4F5D75">Defines the private IP range for your</text>
  <text x="804" y="186" font-size="12" fill="#4F5D75">cluster's internal network. Must not</text>
  <text x="804" y="202" font-size="12" fill="#4F5D75">overlap with your application VPCs.</text>
  <rect x="804" y="214" width="200" height="12" rx="3" fill="#E0F5F2"/>
  <text x="904" y="224" font-size="10" fill="#2A9D8F" text-anchor="middle">Common: 10.0.0.0/16 · 172.16.0.0/12</text>

  <text x="784" y="268" font-size="13" font-weight="700" fill="#1F2D3D">Service Port</text>
  <rect x="784" y="276" width="340" height="2" rx="1" fill="#E5E7EB"/>
  <text x="784" y="296" font-size="12" fill="#4F5D75">Port 3000 is Aerospike's default client</text>
  <text x="784" y="312" font-size="12" fill="#4F5D75">port. Change only if your environment</text>
  <text x="784" y="328" font-size="12" fill="#4F5D75">requires a non-standard setup.</text>

  <text x="784" y="364" font-size="13" font-weight="700" fill="#1F2D3D">Security Groups</text>
  <rect x="784" y="372" width="340" height="2" rx="1" fill="#E5E7EB"/>
  <text x="784" y="392" font-size="12" fill="#4F5D75">Aerospike manages default rules. For</text>
  <text x="784" y="408" font-size="12" fill="#4F5D75">production, restrict inbound access to</text>
  <text x="784" y="424" font-size="12" fill="#4F5D75">known application CIDR ranges only.</text>

  <!-- Link to full docs -->
  <rect x="784" y="448" width="340" height="36" rx="8" fill="#1F2D3D"/>
  <text x="954" y="470" font-size="12" fill="#9CA3AF" text-anchor="middle">Full network setup guide →</text>

  <!-- Connector line from form field to docs -->
  <line x1="684" y1="274" x2="762" y2="148" stroke="#2A9D8F" stroke-width="1.5" stroke-dasharray="4 3"/>
</svg>
