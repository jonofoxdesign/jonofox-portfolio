<svg viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="1200" height="520" fill="#F9FAFB"/>

  <!-- Title -->
  <text x="600" y="44" font-size="13" font-weight="600" fill="#9CA3AF" text-anchor="middle" letter-spacing="1.5">PROVISIONING FLOW — TWO PATHS, ONE OUTCOME</text>

  <!-- ── QUICK SETUP PATH ── -->
  <text x="100" y="108" font-size="12" font-weight="600" fill="#2A9D8F" letter-spacing="1">QUICK SETUP  (most users)</text>

  <!-- Step boxes — Quick path -->
  <!-- Step 1 -->
  <rect x="100" y="120" width="160" height="80" rx="12" fill="white" stroke="#2A9D8F" stroke-width="2"/>
  <circle cx="130" cy="140" r="12" fill="#2A9D8F"/>
  <text x="130" y="145" font-size="11" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="180" y="147" font-size="13" font-weight="600" fill="#1F2D3D" text-anchor="middle">Cloud</text>
  <text x="180" y="163" font-size="13" font-weight="600" fill="#1F2D3D" text-anchor="middle">Provider</text>
  <text x="130" y="188" font-size="11" fill="#4F5D75">AWS / GCP / Azure</text>

  <!-- Arrow -->
  <line x1="264" y1="160" x2="304" y2="160" stroke="#2A9D8F" stroke-width="2"/>
  <polygon points="304,155 316,160 304,165" fill="#2A9D8F"/>

  <!-- Step 2 -->
  <rect x="320" y="120" width="160" height="80" rx="12" fill="white" stroke="#2A9D8F" stroke-width="2"/>
  <circle cx="350" cy="140" r="12" fill="#2A9D8F"/>
  <text x="350" y="145" font-size="11" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="400" y="147" font-size="13" font-weight="600" fill="#1F2D3D" text-anchor="middle">Region &amp;</text>
  <text x="400" y="163" font-size="13" font-weight="600" fill="#1F2D3D" text-anchor="middle">Node Size</text>
  <text x="350" y="188" font-size="11" fill="#4F5D75">Sensible defaults</text>

  <!-- Arrow -->
  <line x1="484" y1="160" x2="524" y2="160" stroke="#2A9D8F" stroke-width="2"/>
  <polygon points="524,155 536,160 524,165" fill="#2A9D8F"/>

  <!-- Step 3 -->
  <rect x="540" y="120" width="160" height="80" rx="12" fill="white" stroke="#2A9D8F" stroke-width="2"/>
  <circle cx="570" cy="140" r="12" fill="#2A9D8F"/>
  <text x="570" y="145" font-size="11" font-weight="700" fill="white" text-anchor="middle">3</text>
  <text x="620" y="155" font-size="13" font-weight="600" fill="#1F2D3D" text-anchor="middle">Review &amp;</text>
  <text x="620" y="171" font-size="13" font-weight="600" fill="#1F2D3D" text-anchor="middle">Launch</text>
  <text x="570" y="188" font-size="11" fill="#4F5D75">Safe defaults locked</text>

  <!-- Arrow to outcome -->
  <line x1="704" y1="160" x2="744" y2="160" stroke="#2A9D8F" stroke-width="2"/>
  <polygon points="744,155 756,160 744,165" fill="#2A9D8F"/>

  <!-- ── ADVANCED PATH ── -->
  <text x="100" y="284" font-size="12" font-weight="600" fill="#4F5D75" letter-spacing="1">ADVANCED  (expert users)</text>

  <!-- Step boxes — Advanced path -->
  <rect x="100" y="296" width="160" height="80" rx="12" fill="white" stroke="#9CA3AF" stroke-width="1.5"/>
  <circle cx="130" cy="316" r="12" fill="#4F5D75"/>
  <text x="130" y="321" font-size="11" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="180" y="323" font-size="13" font-weight="600" fill="#1F2D3D" text-anchor="middle">Cloud</text>
  <text x="180" y="339" font-size="13" font-weight="600" fill="#1F2D3D" text-anchor="middle">Provider</text>

  <line x1="264" y1="336" x2="304" y2="336" stroke="#9CA3AF" stroke-width="1.5"/>
  <polygon points="304,331 316,336 304,341" fill="#9CA3AF"/>

  <rect x="320" y="296" width="160" height="80" rx="12" fill="white" stroke="#9CA3AF" stroke-width="1.5"/>
  <circle cx="350" cy="316" r="12" fill="#4F5D75"/>
  <text x="350" y="321" font-size="11" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="400" y="323" font-size="13" font-weight="600" fill="#1F2D3D" text-anchor="middle">Full Config</text>
  <text x="400" y="339" font-size="13" font-weight="600" fill="#1F2D3D" text-anchor="middle">+ JSON/YAML</text>

  <line x1="484" y1="336" x2="524" y2="336" stroke="#9CA3AF" stroke-width="1.5"/>
  <polygon points="524,331 536,336 524,341" fill="#9CA3AF"/>

  <rect x="540" y="296" width="160" height="80" rx="12" fill="white" stroke="#9CA3AF" stroke-width="1.5"/>
  <circle cx="570" cy="316" r="12" fill="#4F5D75"/>
  <text x="570" y="321" font-size="11" font-weight="700" fill="white" text-anchor="middle">3</text>
  <text x="620" y="323" font-size="13" font-weight="600" fill="#1F2D3D" text-anchor="middle">Network</text>
  <text x="620" y="339" font-size="13" font-weight="600" fill="#1F2D3D" text-anchor="middle">+ Access</text>

  <line x1="704" y1="336" x2="744" y2="336" stroke="#9CA3AF" stroke-width="1.5"/>
  <polygon points="744,331 756,336 744,341" fill="#9CA3AF"/>

  <!-- Switch path indicator -->
  <rect x="280" y="224" width="260" height="28" rx="8" fill="#E0F5F2"/>
  <text x="410" y="242" font-size="12" fill="#2A9D8F" text-anchor="middle">Switch between modes anytime — no restart, no lost context</text>

  <!-- Arrows between paths at step 2 -->
  <line x1="400" y1="200" x2="400" y2="220" stroke="#2A9D8F" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="400" y1="252" x2="400" y2="296" stroke="#4F5D75" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- Outcome box -->
  <rect x="760" y="108" width="200" height="300" rx="16" fill="#1F2D3D"/>
  <text x="860" y="178" font-size="13" font-weight="600" fill="#2A9D8F" text-anchor="middle">Cluster ready</text>
  <text x="860" y="220" font-size="52" font-weight="700" fill="white" text-anchor="middle">72s</text>
  <text x="860" y="250" font-size="13" fill="#9CA3AF" text-anchor="middle">avg end-to-end</text>
  <line x1="790" y1="270" x2="930" y2="270" stroke="#2A3547" stroke-width="1"/>
  <text x="860" y="296" font-size="12" fill="#9CA3AF" text-anchor="middle">Target was 90s</text>
  <rect x="800" y="344" width="120" height="28" rx="8" fill="#2A9D8F22"/>
  <text x="860" y="362" font-size="12" fill="#2A9D8F" text-anchor="middle">Production-ready</text>

  <!-- Merge arrows both converge to outcome -->
  <path d="M 760 160 Q 740 160 740 248 Q 740 336 760 336" stroke="#4F5D75" stroke-width="1.5" fill="none" stroke-dasharray="3 3"/>

  <!-- Bottom annotation -->
  <text x="100" y="450" font-size="12" fill="#9CA3AF">The design bet: defaults shouldn't be a fallback — they should be the primary experience.</text>
  <text x="100" y="470" font-size="12" fill="#9CA3AF">Advanced mode is available from the start, without making everyone use it.</text>
</svg>
