<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="1200" height="400" fill="#F9FAFB"/>

  <text x="600" y="44" font-size="13" font-weight="600" fill="#9CA3AF" text-anchor="middle" letter-spacing="1.5">THE GOLDEN PATH — FROM ZERO TO CONFIDENT</text>
  <text x="600" y="66" font-size="13" fill="#4F5D75" text-anchor="middle">Defining a guided sequence aligned product, growth, and engineering on what success looks like</text>

  <!-- Step nodes -->
  <!-- Step 1: Connect -->
  <circle cx="140" cy="200" r="44" fill="#5A4FCF" opacity="0.12"/>
  <circle cx="140" cy="200" r="32" fill="#5A4FCF"/>
  <!-- Plug icon suggestion -->
  <rect x="128" y="188" width="24" height="20" rx="3" fill="white" opacity="0.9"/>
  <rect x="134" y="182" width="4" height="8" rx="2" fill="white" opacity="0.7"/>
  <rect x="142" y="182" width="4" height="8" rx="2" fill="white" opacity="0.7"/>
  <text x="140" y="258" font-size="14" font-weight="700" fill="#5A4FCF" text-anchor="middle">Connect</text>
  <text x="140" y="276" font-size="11" fill="#4F5D75" text-anchor="middle">Add a connection</text>
  <text x="140" y="290" font-size="11" fill="#4F5D75" text-anchor="middle">to your cluster</text>

  <!-- Arrow 1→2 -->
  <line x1="185" y1="200" x2="285" y2="200" stroke="#5A4FCF" stroke-width="2"/>
  <polygon points="285,195 298,200 285,205" fill="#5A4FCF"/>
  <text x="240" y="190" font-size="11" fill="#9CA3AF" text-anchor="middle">first win</text>

  <!-- Step 2: Add Data -->
  <circle cx="340" cy="200" r="44" fill="#5A4FCF" opacity="0.12"/>
  <circle cx="340" cy="200" r="32" fill="#5A4FCF"/>
  <text x="340" y="206" font-size="20" fill="white" text-anchor="middle" font-weight="600">+</text>
  <text x="340" y="258" font-size="14" font-weight="700" fill="#5A4FCF" text-anchor="middle">Add Data</text>
  <text x="340" y="276" font-size="11" fill="#4F5D75" text-anchor="middle">Insert sample</text>
  <text x="340" y="290" font-size="11" fill="#4F5D75" text-anchor="middle">records</text>

  <!-- Arrow 2→3 -->
  <line x1="385" y1="200" x2="485" y2="200" stroke="#5A4FCF" stroke-width="2"/>
  <polygon points="485,195 498,200 485,205" fill="#5A4FCF"/>
  <text x="440" y="190" font-size="11" fill="#9CA3AF" text-anchor="middle">see it work</text>

  <!-- Step 3: See Data — THE AHA MOMENT -->
  <circle cx="540" cy="200" r="52" fill="#5A4FCF" opacity="0.16"/>
  <circle cx="540" cy="200" r="38" fill="#5A4FCF"/>
  <text x="540" y="207" font-size="24" fill="white" text-anchor="middle">👁</text>
  <text x="540" y="268" font-size="14" font-weight="700" fill="#5A4FCF" text-anchor="middle">See Data</text>
  <text x="540" y="286" font-size="11" fill="#4F5D75" text-anchor="middle">Browse records,</text>
  <text x="540" y="300" font-size="11" fill="#4F5D75" text-anchor="middle">understand structure</text>
  <!-- Aha moment callout -->
  <rect x="476" y="100" width="128" height="28" rx="14" fill="#5A4FCF"/>
  <text x="540" y="118" font-size="11" font-weight="700" fill="white" text-anchor="middle">✦ aha moment</text>
  <line x1="540" y1="128" x2="540" y2="162" stroke="#5A4FCF" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Arrow 3→4 -->
  <line x1="595" y1="200" x2="695" y2="200" stroke="#5A4FCF" stroke-width="2"/>
  <polygon points="695,195 708,200 695,205" fill="#5A4FCF"/>
  <text x="648" y="190" font-size="11" fill="#9CA3AF" text-anchor="middle">go deeper</text>

  <!-- Step 4: Inspect -->
  <circle cx="750" cy="200" r="44" fill="#5A4FCF" opacity="0.12"/>
  <circle cx="750" cy="200" r="32" fill="#5A4FCF"/>
  <text x="750" y="207" font-size="22" fill="white" text-anchor="middle">⌕</text>
  <text x="750" y="258" font-size="14" font-weight="700" fill="#5A4FCF" text-anchor="middle">Inspect</text>
  <text x="750" y="276" font-size="11" fill="#4F5D75" text-anchor="middle">Expand records,</text>
  <text x="750" y="290" font-size="11" fill="#4F5D75" text-anchor="middle">explore bins &amp; types</text>

  <!-- Arrow 4→5 -->
  <line x1="795" y1="200" x2="895" y2="200" stroke="#5A4FCF" stroke-width="2"/>
  <polygon points="895,195 908,200 895,205" fill="#5A4FCF"/>
  <text x="848" y="190" font-size="11" fill="#9CA3AF" text-anchor="middle">get precise</text>

  <!-- Step 5: Filter -->
  <circle cx="950" cy="200" r="44" fill="#5A4FCF" opacity="0.12"/>
  <circle cx="950" cy="200" r="32" fill="#5A4FCF"/>
  <!-- Filter icon -->
  <path d="M938 188 L962 188 L952 202 L952 214 L948 214 L948 202 Z" fill="white" opacity="0.9"/>
  <text x="950" y="258" font-size="14" font-weight="700" fill="#5A4FCF" text-anchor="middle">Filter</text>
  <text x="950" y="276" font-size="11" fill="#4F5D75" text-anchor="middle">Build queries with</text>
  <text x="950" y="290" font-size="11" fill="#4F5D75" text-anchor="middle">the visual builder</text>

  <!-- Arrow to outcome -->
  <line x1="995" y1="200" x2="1055" y2="200" stroke="#2A9D8F" stroke-width="2"/>
  <polygon points="1055,195 1068,200 1055,205" fill="#2A9D8F"/>

  <!-- Outcome box -->
  <rect x="1072" y="168" width="112" height="64" rx="12" fill="#2A9D8F"/>
  <text x="1128" y="196" font-size="12" font-weight="700" fill="white" text-anchor="middle">Confident</text>
  <text x="1128" y="212" font-size="12" font-weight="700" fill="white" text-anchor="middle">to build</text>

  <!-- Bottom note -->
  <text x="600" y="350" font-size="12" fill="#9CA3AF" text-anchor="middle">This path also became the backbone of the telemetry strategy — the same steps are tracked as activation milestones.</text>
  <text x="600" y="368" font-size="12" fill="#9CA3AF" text-anchor="middle">And later, the same structure became the interface AI tools use to explore Aerospike via MCP.</text>
</svg>
