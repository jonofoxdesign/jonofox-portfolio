<svg viewBox="0 0 1200 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="1200" height="540" fill="#F9FAFB"/>

  <text x="600" y="44" font-size="12" font-weight="600" fill="#9CA3AF" text-anchor="middle" letter-spacing="1.5">SYGNUM — BEFORE &amp; AFTER: THE SHARED PROBLEM</text>
  <text x="600" y="64" font-size="13" fill="#4F5D75" text-anchor="middle">Nine CSS repos. Nine different button styles. No shared standard. Nobody agreed on what good looked like.</text>

  <!-- BEFORE -->
  <text x="290" y="100" font-size="14" font-weight="700" fill="#9CA3AF" text-anchor="middle">BEFORE</text>
  <rect x="60" y="112" width="460" height="396" rx="16" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>

  <!-- Chaotic buttons — 5 different styles -->
  <text x="80" y="148" font-size="11" fill="#9CA3AF">buttons across 9 repos</text>
  <rect x="80" y="156" width="100" height="32" rx="4" fill="#1F8B7A" />
  <text x="130" y="176" font-size="11" fill="white" text-anchor="middle">Submit</text>
  <rect x="196" y="160" width="100" height="24" fill="#2B7A6F"/>
  <text x="246" y="176" font-size="11" fill="white" text-anchor="middle">Confirm</text>
  <rect x="312" y="156" width="100" height="32" rx="16" fill="#0E7A6A"/>
  <text x="362" y="176" font-size="11" fill="white" text-anchor="middle">Proceed</text>
  <rect x="430" y="158" width="64" height="28" rx="6" fill="#3A9D8F" stroke="#2A9D8F" stroke-width="2"/>
  <text x="462" y="176" font-size="11" fill="white" text-anchor="middle">Go</text>

  <!-- Annotation line -->
  <line x1="80" y1="196" x2="496" y2="196" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- Chaotic inputs -->
  <text x="80" y="218" font-size="11" fill="#9CA3AF">input fields</text>
  <rect x="80" y="226" width="180" height="32" rx="0" fill="white" stroke="#9CA3AF" stroke-width="2"/>
  <text x="170" y="246" font-size="11" fill="#9CA3AF" text-anchor="middle">Account number</text>
  <rect x="280" y="226" width="180" height="36" rx="8" fill="#F3F4F6"/>
  <text x="370" y="248" font-size="11" fill="#9CA3AF" text-anchor="middle">Reference</text>

  <line x1="80" y1="272" x2="496" y2="272" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- Chaotic typography -->
  <text x="80" y="294" font-size="11" fill="#9CA3AF">headings — different weights, sizes, fonts</text>
  <text x="80" y="316" font-size="22" font-weight="700" fill="#1F2D3D" font-family="Georgia, serif">Asset Overview</text>
  <text x="80" y="344" font-size="18" font-weight="600" fill="#1F2D3D">Portfolio Summary</text>
  <text x="80" y="368" font-size="20" font-weight="700" fill="#333333" font-family="'Courier New', monospace">My Holdings</text>

  <line x1="80" y1="384" x2="496" y2="384" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- Issue count -->
  <rect x="80" y="396" width="420" height="80" rx="10" fill="#FEF2F2"/>
  <text x="290" y="428" font-size="13" font-weight="700" fill="#DC2626" text-anchor="middle">9 different visual styles</text>
  <text x="290" y="448" font-size="12" fill="#DC2626" text-anchor="middle">No shared standard · Local decisions · No token layer</text>
  <text x="290" y="466" font-size="12" fill="#DC2626" text-anchor="middle">New team members don't know what good looks like</text>

  <!-- Divider arrow -->
  <rect x="536" y="276" width="128" height="36" rx="18" fill="#1F2D3D"/>
  <text x="600" y="298" font-size="13" font-weight="600" fill="white" text-anchor="middle">Design system →</text>

  <!-- AFTER -->
  <text x="910" y="100" font-size="14" font-weight="700" fill="#2A9D8F" text-anchor="middle">AFTER</text>
  <rect x="680" y="112" width="460" height="396" rx="16" fill="white" stroke="#2A9D8F" stroke-width="2"/>

  <!-- Unified buttons -->
  <text x="700" y="148" font-size="11" fill="#9CA3AF">one button component, multiple variants</text>
  <rect x="700" y="156" width="120" height="36" rx="10" fill="#2A9D8F"/>
  <text x="760" y="178" font-size="13" font-weight="600" fill="white" text-anchor="middle">Primary</text>
  <rect x="836" y="156" width="120" height="36" rx="10" fill="white" stroke="#2A9D8F" stroke-width="1.5"/>
  <text x="896" y="178" font-size="13" font-weight="600" fill="#2A9D8F" text-anchor="middle">Secondary</text>
  <rect x="972" y="156" width="80" height="36" rx="10" fill="#F3F4F6"/>
  <text x="1012" y="178" font-size="13" font-weight="500" fill="#4F5D75" text-anchor="middle">Ghost</text>

  <line x1="700" y1="202" x2="1116" y2="202" stroke="#E0F5F2" stroke-width="1"/>

  <!-- Unified inputs -->
  <text x="700" y="224" font-size="11" fill="#9CA3AF">one input component</text>
  <rect x="700" y="232" width="180" height="36" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="790" y="254" font-size="12" fill="#9CA3AF" text-anchor="middle">Account number</text>
  <rect x="898" y="232" width="180" height="36" rx="8" fill="white" stroke="#2A9D8F" stroke-width="2"/>
  <text x="988" y="250" font-size="12" fill="#9CA3AF" text-anchor="middle">Reference</text>
  <rect x="898" y="232" width="3" height="36" rx="1" fill="#2A9D8F"/>

  <line x1="700" y1="278" x2="1116" y2="278" stroke="#E0F5F2" stroke-width="1"/>

  <!-- Unified typography -->
  <text x="700" y="300" font-size="11" fill="#9CA3AF">one type scale</text>
  <text x="700" y="320" font-size="22" font-weight="700" fill="#1F2D3D">Asset Overview</text>
  <text x="700" y="348" font-size="16" font-weight="600" fill="#1F2D3D">Portfolio Summary</text>
  <text x="700" y="372" font-size="13" fill="#4F5D75">BTC · ETH · tokenised assets · staking</text>

  <line x1="700" y1="388" x2="1116" y2="388" stroke="#E0F5F2" stroke-width="1"/>

  <!-- Outcome -->
  <rect x="700" y="400" width="420" height="80" rx="10" fill="#E0F5F2"/>
  <text x="910" y="432" font-size="13" font-weight="700" fill="#2A9D8F" text-anchor="middle">One shared system</text>
  <text x="910" y="452" font-size="12" fill="#2A9D8F" text-anchor="middle">Tokens defined once · Components with clear states</text>
  <text x="910" y="470" font-size="12" fill="#2A9D8F" text-anchor="middle">Contribution rules · Teams aligned on what good is</text>
</svg>
