<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <!-- Background -->
  <rect width="1200" height="675" fill="#FFF2E0"/>

  <!-- Main card -->
  <rect x="60" y="40" width="1080" height="595" rx="16" fill="white" stroke="#F5C893" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="60" y="40" width="1080" height="52" rx="16" fill="#1F2D3D"/>
  <rect x="60" y="76" width="1080" height="16" fill="#1F2D3D"/>
  <text x="96" y="72" font-size="14" font-weight="600" fill="white">Design System — Aerospike</text>
  <rect x="1000" y="54" width="110" height="28" rx="6" fill="#F57C00"/>
  <text x="1055" y="72" font-size="12" font-weight="600" fill="white" text-anchor="middle">v3.4.0 ✓</text>

  <!-- Left nav -->
  <rect x="60" y="92" width="200" height="543" fill="#F9FAFB"/>
  <text x="88" y="122" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1.2">FOUNDATIONS</text>
  <text x="88" y="148" font-size="13" fill="#F57C00" font-weight="600">Colors</text>
  <text x="88" y="172" font-size="13" fill="#4F5D75">Typography</text>
  <text x="88" y="196" font-size="13" fill="#4F5D75">Spacing</text>
  <text x="88" y="220" font-size="13" fill="#4F5D75">Elevation</text>
  <text x="88" y="256" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1.2">COMPONENTS</text>
  <text x="88" y="282" font-size="13" fill="#4F5D75">Button</text>
  <text x="88" y="306" font-size="13" fill="#4F5D75">Input</text>
  <text x="88" y="330" font-size="13" fill="#4F5D75">Badge</text>
  <text x="88" y="354" font-size="13" fill="#4F5D75">Card</text>
  <text x="88" y="378" font-size="13" fill="#4F5D75">Modal</text>
  <text x="88" y="414" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1.2">PATTERNS</text>
  <text x="88" y="440" font-size="13" fill="#4F5D75">Data table</text>
  <text x="88" y="464" font-size="13" fill="#4F5D75">Empty states</text>
  <text x="88" y="488" font-size="13" fill="#4F5D75">Form layout</text>

  <!-- Main content -->
  <text x="296" y="128" font-size="22" font-weight="700" fill="#1F2D3D">Color Tokens</text>
  <text x="296" y="150" font-size="13" fill="#4F5D75">Design tokens are the single source of truth — defined once, used everywhere across Figma, code, and AI tools.</text>

  <!-- Color token grid -->
  <!-- Primary row -->
  <text x="296" y="190" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1.2">PRIMARY — TEAL</text>
  <rect x="296" y="200" width="80" height="60" rx="8" fill="#E0F5F2"/>
  <text x="336" y="274" font-size="10" fill="#4F5D75" text-anchor="middle">teal-subtle</text>
  <text x="336" y="286" font-size="10" fill="#9CA3AF" text-anchor="middle">E0F5F2</text>

  <rect x="388" y="200" width="80" height="60" rx="8" fill="#2A9D8F"/>
  <text x="428" y="274" font-size="10" fill="#4F5D75" text-anchor="middle">teal</text>
  <text x="428" y="286" font-size="10" fill="#9CA3AF" text-anchor="middle">2A9D8F</text>

  <rect x="480" y="200" width="80" height="60" rx="8" fill="#21867A"/>
  <text x="520" y="274" font-size="10" fill="#4F5D75" text-anchor="middle">teal-hover</text>
  <text x="520" y="286" font-size="10" fill="#9CA3AF" text-anchor="middle">21867A</text>

  <!-- Accent row -->
  <text x="600" y="190" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1.2">ACCENT — FOX</text>
  <rect x="600" y="200" width="80" height="60" rx="8" fill="#FFF2E0"/>
  <text x="640" y="274" font-size="10" fill="#4F5D75" text-anchor="middle">fox-subtle</text>
  <text x="640" y="286" font-size="10" fill="#9CA3AF" text-anchor="middle">FFF2E0</text>

  <rect x="692" y="200" width="80" height="60" rx="8" fill="#F57C00"/>
  <text x="732" y="274" font-size="10" fill="#4F5D75" text-anchor="middle">fox</text>
  <text x="732" y="286" font-size="10" fill="#9CA3AF" text-anchor="middle">F57C00</text>

  <rect x="784" y="200" width="80" height="60" rx="8" fill="#DB6800"/>
  <text x="824" y="274" font-size="10" fill="#4F5D75" text-anchor="middle">fox-hover</text>
  <text x="824" y="286" font-size="10" fill="#9CA3AF" text-anchor="middle">DB6800</text>

  <!-- Ink row -->
  <text x="296" y="316" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1.2">INK — TEXT</text>
  <rect x="296" y="326" width="80" height="60" rx="8" fill="#1F2D3D"/>
  <text x="336" y="400" font-size="10" fill="#4F5D75" text-anchor="middle">ink</text>
  <rect x="388" y="326" width="80" height="60" rx="8" fill="#4F5D75"/>
  <text x="428" y="400" font-size="10" fill="#4F5D75" text-anchor="middle">ink-secondary</text>
  <rect x="480" y="326" width="80" height="60" rx="8" fill="#9CA3AF"/>
  <text x="520" y="400" font-size="10" fill="#4F5D75" text-anchor="middle">ink-disabled</text>

  <!-- Surface row -->
  <text x="600" y="316" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1.2">SURFACE — BG</text>
  <rect x="600" y="326" width="80" height="60" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="640" y="400" font-size="10" fill="#4F5D75" text-anchor="middle">surface-light</text>
  <rect x="692" y="326" width="80" height="60" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="732" y="400" font-size="10" fill="#4F5D75" text-anchor="middle">surface</text>
  <rect x="784" y="326" width="80" height="60" rx="8" fill="#E5E7EB"/>
  <text x="824" y="400" font-size="10" fill="#4F5D75" text-anchor="middle">surface-muted</text>

  <!-- Token code block -->
  <rect x="296" y="424" width="560" height="110" rx="10" fill="#1F2D3D"/>
  <text x="320" y="448" font-size="11" font-weight="600" fill="#6B7A8D">tokens.json</text>
  <text x="320" y="468" font-size="11" fill="#9CA3AF" xml:space="preserve">  "color": &#123;</text>
  <text x="320" y="484" font-size="11" fill="#2A9D8F" xml:space="preserve">    "teal": &#123; "value": "#2A9D8F", "type": "color" &#125;,</text>
  <text x="320" y="500" font-size="11" fill="#F57C00" xml:space="preserve">    "fox":  &#123; "value": "#F57C00", "type": "color" &#125;,</text>
  <text x="320" y="516" font-size="11" fill="#9CA3AF" xml:space="preserve">    "ink":  &#123; "value": "#1F2D3D", "type": "color" &#125;</text>
  <text x="320" y="532" font-size="11" fill="#9CA3AF" xml:space="preserve">  &#125;</text>

  <!-- AI badge -->
  <rect x="880" y="424" width="220" height="110" rx="10" fill="#1F2D3D"/>
  <text x="990" y="452" font-size="11" font-weight="600" fill="#F57C00" text-anchor="middle">AI-Readable</text>
  <text x="990" y="472" font-size="11" fill="#6B7A8D" text-anchor="middle">Claude · Cursor · Codex</text>
  <rect x="910" y="484" width="160" height="1" fill="#2A3547"/>
  <text x="990" y="504" font-size="12" fill="#9CA3AF" text-anchor="middle">Markdown layer defines</text>
  <text x="990" y="520" font-size="12" fill="#9CA3AF" text-anchor="middle">usage rules, not just values</text>

  <!-- Component preview strip -->
  <text x="296" y="566" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1.2">COMPONENT TOKENS IN USE</text>
  <rect x="296" y="576" width="100" height="36" rx="8" fill="#2A9D8F"/>
  <text x="346" y="598" font-size="12" font-weight="600" fill="white" text-anchor="middle">Primary</text>
  <rect x="412" y="576" width="100" height="36" rx="8" fill="white" stroke="#2A9D8F" stroke-width="1.5"/>
  <text x="462" y="598" font-size="12" font-weight="600" fill="#2A9D8F" text-anchor="middle">Outline</text>
  <rect x="528" y="576" width="80" height="36" rx="8" fill="#E0F5F2"/>
  <text x="568" y="598" font-size="12" font-weight="600" fill="#2A9D8F" text-anchor="middle">Ghost</text>
  <rect x="624" y="580" width="52" height="20" rx="10" fill="#E0F5F2"/>
  <text x="650" y="594" font-size="11" fill="#2A9D8F" text-anchor="middle">Active</text>
  <rect x="686" y="580" width="64" height="20" rx="10" fill="#FFF2E0"/>
  <text x="718" y="594" font-size="11" fill="#F57C00" text-anchor="middle">Warning</text>
  <rect x="760" y="580" width="56" height="20" rx="10" fill="#F3F4F6"/>
  <text x="788" y="594" font-size="11" fill="#4F5D75" text-anchor="middle">Neutral</text>
</svg>
