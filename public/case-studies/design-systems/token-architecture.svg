<svg viewBox="0 0 1200 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="1200" height="540" fill="#F9FAFB"/>

  <text x="600" y="44" font-size="12" font-weight="600" fill="#9CA3AF" text-anchor="middle" letter-spacing="1.5">TOKEN ARCHITECTURE — DEFINED ONCE, USED EVERYWHERE</text>
  <text x="600" y="64" font-size="13" fill="#4F5D75" text-anchor="middle">Decisions encoded at the primitive level flow through semantic tokens into component tokens — across Figma, code, and AI output.</text>

  <!-- ── Tier 1: Primitives ── -->
  <text x="140" y="104" font-size="13" font-weight="700" fill="#1F2D3D">Primitives</text>
  <text x="140" y="120" font-size="11" fill="#9CA3AF">Raw values. No context attached.</text>

  <rect x="80" y="132" width="320" height="180" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>

  <!-- Color primitives -->
  <circle cx="112" cy="164" r="14" fill="#2A9D8F"/>
  <text x="134" y="162" font-size="11" font-weight="600" fill="#1F2D3D">teal-500</text>
  <text x="134" y="176" font-size="11" fill="#9CA3AF">#2A9D8F</text>

  <circle cx="112" cy="208" r="14" fill="#F57C00"/>
  <text x="134" y="206" font-size="11" font-weight="600" fill="#1F2D3D">orange-600</text>
  <text x="134" y="220" font-size="11" fill="#9CA3AF">#F57C00</text>

  <circle cx="112" cy="252" r="14" fill="#1F2D3D"/>
  <text x="134" y="250" font-size="11" font-weight="600" fill="#1F2D3D">navy-900</text>
  <text x="134" y="264" font-size="11" fill="#9CA3AF">#1F2D3D</text>

  <circle cx="220" cy="164" r="14" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="242" y="162" font-size="11" font-weight="600" fill="#1F2D3D">gray-50</text>
  <text x="242" y="176" font-size="11" fill="#9CA3AF">#F9FAFB</text>

  <circle cx="220" cy="208" r="14" fill="#E5E7EB"/>
  <text x="242" y="206" font-size="11" font-weight="600" fill="#1F2D3D">gray-200</text>
  <text x="242" y="220" font-size="11" fill="#9CA3AF">#E5E7EB</text>

  <circle cx="220" cy="252" r="14" fill="#4F5D75"/>
  <text x="242" y="250" font-size="11" font-weight="600" fill="#1F2D3D">navy-600</text>
  <text x="242" y="264" font-size="11" fill="#9CA3AF">#4F5D75</text>

  <circle cx="328" cy="164" r="14" fill="#9CA3AF"/>
  <text x="350" y="162" font-size="11" font-weight="600" fill="#1F2D3D">gray-400</text>
  <text x="350" y="176" font-size="11" fill="#9CA3AF">#9CA3AF</text>

  <!-- Type/spacing primitives -->
  <text x="96" y="308" font-size="11" fill="#9CA3AF">12  14  16  20  24  32  40  48</text>
  <text x="96" y="322" font-size="11" fill="#9CA3AF">font-size primitives (px)</text>
  <text x="96" y="338" font-size="11" fill="#9CA3AF">4  8  12  16  24  32  48  64</text>
  <text x="96" y="352" font-size="11" fill="#9CA3AF">spacing primitives (px)</text>

  <!-- Arrow 1→2 -->
  <line x1="404" y1="220" x2="464" y2="220" stroke="#9CA3AF" stroke-width="2"/>
  <polygon points="460,215 472,220 460,225" fill="#9CA3AF"/>
  <text x="434" y="212" font-size="11" fill="#9CA3AF" text-anchor="middle">intent</text>

  <!-- ── Tier 2: Semantic ── -->
  <text x="540" y="104" font-size="13" font-weight="700" fill="#1F2D3D">Semantic</text>
  <text x="540" y="120" font-size="11" fill="#9CA3AF">Named by purpose, not appearance.</text>

  <rect x="476" y="132" width="300" height="252" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>

  <text x="500" y="162" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">COLOR</text>
  <!-- Semantic tokens -->
  <rect x="500" y="170" width="120" height="24" rx="6" fill="#E0F5F2"/>
  <text x="560" y="186" font-size="11" fill="#2A9D8F" text-anchor="middle">color.primary</text>
  <text x="636" y="186" font-size="11" fill="#9CA3AF">→ teal-500</text>

  <rect x="500" y="200" width="120" height="24" rx="6" fill="#FFF2E0"/>
  <text x="560" y="216" font-size="11" fill="#F57C00" text-anchor="middle">color.accent</text>
  <text x="636" y="216" font-size="11" fill="#9CA3AF">→ orange-600</text>

  <rect x="500" y="230" width="120" height="24" rx="6" fill="#F3F4F6"/>
  <text x="560" y="246" font-size="11" fill="#1F2D3D" text-anchor="middle">color.text</text>
  <text x="636" y="246" font-size="11" fill="#9CA3AF">→ navy-900</text>

  <rect x="500" y="260" width="120" height="24" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="560" y="276" font-size="11" fill="#4F5D75" text-anchor="middle">color.surface</text>
  <text x="636" y="276" font-size="11" fill="#9CA3AF">→ gray-50</text>

  <text x="500" y="310" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">TYPOGRAPHY</text>
  <text x="500" y="328" font-size="11" fill="#4F5D75">font.size.body  → 14px</text>
  <text x="500" y="344" font-size="11" fill="#4F5D75">font.size.heading → 24px</text>
  <text x="500" y="360" font-size="11" fill="#4F5D75">font.weight.bold → 700</text>

  <!-- Arrow 2→3 -->
  <line x1="780" y1="260" x2="840" y2="260" stroke="#9CA3AF" stroke-width="2"/>
  <polygon points="836,255 848,260 836,265" fill="#9CA3AF"/>
  <text x="810" y="252" font-size="11" fill="#9CA3AF" text-anchor="middle">applied</text>

  <!-- ── Tier 3: Component ── -->
  <text x="940" y="104" font-size="13" font-weight="700" fill="#1F2D3D">Component</text>
  <text x="940" y="120" font-size="11" fill="#9CA3AF">Purpose-specific, ready to use.</text>

  <rect x="860" y="132" width="284" height="320" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>

  <!-- Button component token preview -->
  <text x="884" y="162" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">BUTTON</text>
  <rect x="884" y="172" width="120" height="36" rx="8" fill="#2A9D8F"/>
  <text x="944" y="194" font-size="13" font-weight="600" fill="white" text-anchor="middle">Primary</text>
  <text x="884" y="226" font-size="11" fill="#4F5D75">bg → color.primary</text>
  <text x="884" y="240" font-size="11" fill="#4F5D75">text → color.surface</text>
  <text x="884" y="254" font-size="11" fill="#4F5D75">radius → 10px</text>

  <text x="884" y="284" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">INPUT</text>
  <rect x="884" y="294" width="220" height="36" rx="8" fill="white" stroke="#2A9D8F" stroke-width="2"/>
  <text x="904" y="316" font-size="12" fill="#9CA3AF">Placeholder text</text>
  <text x="884" y="350" font-size="11" fill="#4F5D75">border → color.primary (focus)</text>
  <text x="884" y="364" font-size="11" fill="#4F5D75">bg → color.surface</text>

  <text x="884" y="394" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">BADGE</text>
  <rect x="884" y="402" width="68" height="22" rx="11" fill="#E0F5F2"/>
  <text x="918" y="417" font-size="11" fill="#2A9D8F" text-anchor="middle">Active</text>
  <rect x="964" y="402" width="80" height="22" rx="11" fill="#FFF2E0"/>
  <text x="1004" y="417" font-size="11" fill="#F57C00" text-anchor="middle">Warning</text>

  <!-- Bottom: where tokens flow to -->
  <rect x="80" y="420" width="1064" height="80" rx="12" fill="#1F2D3D"/>
  <text x="600" y="452" font-size="12" font-weight="600" fill="#9CA3AF" text-anchor="middle">USED ACROSS</text>
  <text x="240" y="476" font-size="13" font-weight="600" fill="white" text-anchor="middle">Figma Variables</text>
  <text x="240" y="492" font-size="11" fill="#4F5D75" text-anchor="middle">Design token library</text>
  <text x="490" y="476" font-size="13" font-weight="600" fill="white" text-anchor="middle">CSS Variables</text>
  <text x="490" y="492" font-size="11" fill="#4F5D75" text-anchor="middle">Production code</text>
  <text x="740" y="476" font-size="13" font-weight="600" fill="white" text-anchor="middle">Markdown Docs</text>
  <text x="740" y="492" font-size="11" fill="#4F5D75" text-anchor="middle">AI instruction layer</text>
  <text x="990" y="476" font-size="13" font-weight="600" fill="#2A9D8F" text-anchor="middle">AI-generated UI</text>
  <text x="990" y="492" font-size="11" fill="#4F5D75" text-anchor="middle">System-consistent output</text>
  <!-- Dividers -->
  <line x1="360" y1="440" x2="360" y2="494" stroke="#2A3547" stroke-width="1"/>
  <line x1="610" y1="440" x2="610" y2="494" stroke="#2A3547" stroke-width="1"/>
  <line x1="860" y1="440" x2="860" y2="494" stroke="#2A3547" stroke-width="1"/>
</svg>
