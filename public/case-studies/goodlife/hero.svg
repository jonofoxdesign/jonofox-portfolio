  <line x1="856" y1="148" x2="1076" y2="148" stroke="#E5E7EB" stroke-width="1"/>

  <text x="856" y="172" font-size="12" fill="#9CA3AF">Plan</text>
  <text x="1076" y="172" font-size="12" font-weight="600" fill="#1F2D3D" text-anchor="end">Standard</text>

  <text x="856" y="196" font-size="12" fill="#9CA3AF">Duration</text>
  <text x="1076" y="196" font-size="12" font-weight="600" fill="#1F2D3D" text-anchor="end">12 months</text>

  <text x="856" y="220" font-size="12" fill="#9CA3AF">Club access</text>
  <text x="1076" y="220" font-size="12" font-weight="600" fill="#1F2D3D" text-anchor="end">All clubs</text>

  <line x1="856" y1="236" x2="1076" y2="236" stroke="#E5E7EB" stroke-width="1"/>

  <text x="856" y="262" font-size="12" fill="#9CA3AF">Joining fee</text>
  <text x="1076" y="262" font-size="12" fill="#2A9D8F" text-anchor="end">Waived</text>

  <text x="856" y="286" font-size="12" fill="#9CA3AF">Fortnightly</text>
  <text x="1076" y="286" font-size="16" font-weight="700" fill="#E91E63" text-anchor="end">$49.00</text>

  <line x1="856" y1="302" x2="1076" y2="302" stroke="#E5E7EB" stroke-width="1"/>

  <text x="856" y="324" font-size="11" fill="#9CA3AF">Minimum commitment</text>
  <text x="1076" y="324" font-size="12" fill="#1F2D3D" text-anchor="end">$1,274</text>
  <text x="966" y="346" font-size="11" fill="#9CA3AF" text-anchor="middle">26 fortnights at $49</text>

  <rect x="856" y="560" width="220" height="44" rx="10" fill="#E91E63"/>
  <text x="966" y="586" font-size="13" font-weight="600" fill="white" text-anchor="middle">Continue to location →</text>

  <text x="966" y="618" font-size="11" fill="#9CA3AF" text-anchor="middle">No payment taken today</text>
