  <circle cx="420" cy="68" r="10" fill="#E91E63"/>
  <text x="420" y="72" font-size="10" font-weight="700" fill="white" text-anchor="middle">1</text>
  <line x1="430" y1="68" x2="498" y2="68" stroke="#E91E63" stroke-width="2"/>
  <circle cx="510" cy="68" r="10" fill="#E91E63"/>
  <text x="510" y="72" font-size="10" font-weight="700" fill="white" text-anchor="middle">2</text>
  <line x1="520" y1="68" x2="588" y2="68" stroke="#4B6273" stroke-width="2" stroke-dasharray="4 2"/>
  <circle cx="600" cy="68" r="10" fill="#4B6273"/>
  <text x="600" y="72" font-size="10" font-weight="700" fill="white" text-anchor="middle">3</text>
  <line x1="610" y1="68" x2="678" y2="68" stroke="#4B6273" stroke-width="2" stroke-dasharray="4 2"/>
  <circle cx="690" cy="68" r="10" fill="#4B6273"/>
  <text x="690" y="72" font-size="10" font-weight="700" fill="white" text-anchor="middle">4</text>
  <line x1="700" y1="68" x2="768" y2="68" stroke="#4B6273" stroke-width="2" stroke-dasharray="4 2"/>
