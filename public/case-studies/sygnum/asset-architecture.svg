<svg viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="1200" height="520" fill="#F9FAFB"/>

  <text x="600" y="44" font-size="12" font-weight="600" fill="#9CA3AF" text-anchor="middle" letter-spacing="1.5">INFORMATION ARCHITECTURE — HOW CLIENTS THINK, NOT HOW SYSTEMS ARE STRUCTURED</text>
  <text x="600" y="64" font-size="13" fill="#4F5D75" text-anchor="middle">Assets and actions grouped based on the client's mental model. Regulation made accuracy non-negotiable — complexity had to be structured, not hidden.</text>

  <!-- Top level: Total Portfolio -->
  <rect x="424" y="88" width="352" height="72" rx="14" fill="#1F2D3D"/>
  <text x="600" y="118" font-size="12" font-weight="600" fill="#6B7A8D" text-anchor="middle">Total Portfolio</text>
  <text x="600" y="146" font-size="26" font-weight="700" fill="white" text-anchor="middle">CHF 4,821,450</text>

  <!-- Connector lines down -->
  <line x1="510" y1="160" x2="200" y2="216" stroke="#E5E7EB" stroke-width="1.5"/>
  <line x1="570" y1="160" x2="430" y2="216" stroke="#E5E7EB" stroke-width="1.5"/>
  <line x1="630" y1="160" x2="750" y2="216" stroke="#E5E7EB" stroke-width="1.5"/>
  <line x1="690" y1="160" x2="1000" y2="216" stroke="#E5E7EB" stroke-width="1.5"/>

  <!-- Category 1: Trading Wallets -->
  <rect x="80" y="216" width="220" height="100" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="80" y="216" width="220" height="8" rx="12" fill="#2A9D8F"/>
  <rect x="80" y="220" width="220" height="4" fill="#2A9D8F"/>
  <text x="190" y="254" font-size="12" font-weight="700" fill="#1F2D3D" text-anchor="middle">Trading Wallets</text>
  <text x="190" y="272" font-size="12" fill="#4F5D75" text-anchor="middle">BTC · ETH · USDC</text>
  <text x="190" y="290" font-size="12" fill="#9CA3AF" text-anchor="middle">Instant liquidity</text>
  <text x="190" y="306" font-size="13" font-weight="700" fill="#2A9D8F" text-anchor="middle">CHF 1,240,000</text>

  <!-- Category 2: Vault Wallets -->
  <rect x="320" y="216" width="220" height="100" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="320" y="216" width="220" height="8" rx="12" fill="#5A4FCF"/>
  <rect x="320" y="220" width="220" height="4" fill="#5A4FCF"/>
  <text x="430" y="254" font-size="12" font-weight="700" fill="#1F2D3D" text-anchor="middle">Vault Wallets</text>
  <text x="430" y="272" font-size="12" fill="#4F5D75" text-anchor="middle">Cold storage · BTC · ETH</text>
  <text x="430" y="290" font-size="12" fill="#9CA3AF" text-anchor="middle">Institutional custody</text>
  <text x="430" y="306" font-size="13" font-weight="700" fill="#5A4FCF" text-anchor="middle">CHF 2,180,000</text>

  <!-- Category 3: Staking -->
  <rect x="660" y="216" width="220" height="100" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="660" y="216" width="220" height="8" rx="12" fill="#F57C00"/>
  <rect x="660" y="220" width="220" height="4" fill="#F57C00"/>
  <text x="770" y="254" font-size="12" font-weight="700" fill="#1F2D3D" text-anchor="middle">Staking</text>
  <text x="770" y="272" font-size="12" fill="#4F5D75" text-anchor="middle">ETH · ADA · DOT</text>
  <text x="770" y="290" font-size="12" fill="#9CA3AF" text-anchor="middle">Yield-earning assets</text>
  <text x="770" y="306" font-size="13" font-weight="700" fill="#F57C00" text-anchor="middle">CHF 291,450</text>

  <!-- Category 4: Asset Tokens -->
  <rect x="900" y="216" width="220" height="100" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="900" y="216" width="220" height="8" rx="12" fill="#E91E63"/>
  <rect x="900" y="220" width="220" height="4" fill="#E91E63"/>
  <text x="1010" y="254" font-size="12" font-weight="700" fill="#1F2D3D" text-anchor="middle">Asset Tokens</text>
  <text x="1010" y="272" font-size="12" fill="#4F5D75" text-anchor="middle">Tokenised real estate</text>
  <text x="1010" y="290" font-size="12" fill="#9CA3AF" text-anchor="middle">Sygnum-issued tokens</text>
  <text x="1010" y="306" font-size="13" font-weight="700" fill="#E91E63" text-anchor="middle">CHF 110,000</text>

  <!-- Asset detail level (trading wallets expanded) -->
  <line x1="130" y1="316" x2="130" y2="356" stroke="#2A9D8F" stroke-width="1.5"/>
  <line x1="190" y1="316" x2="190" y2="356" stroke="#2A9D8F" stroke-width="1.5"/>
  <line x1="250" y1="316" x2="250" y2="356" stroke="#2A9D8F" stroke-width="1.5"/>

  <!-- Individual assets -->
  <rect x="80" y="356" width="100" height="80" rx="10" fill="#E0F5F2"/>
  <text x="130" y="384" font-size="12" font-weight="700" fill="#2A9D8F" text-anchor="middle">BTC</text>
  <text x="130" y="400" font-size="11" fill="#4F5D75" text-anchor="middle">0.42 BTC</text>
  <text x="130" y="416" font-size="12" font-weight="700" fill="#1F2D3D" text-anchor="middle">CHF 24,180</text>
  <rect x="80" y="436" width="100" height="28" rx="6" fill="#2A9D8F"/>
  <text x="130" y="454" font-size="11" font-weight="600" fill="white" text-anchor="middle">Trade</text>

  <rect x="192" y="356" width="100" height="80" rx="10" fill="#E0F5F2"/>
  <text x="242" y="384" font-size="12" font-weight="700" fill="#2A9D8F" text-anchor="middle">ETH</text>
  <text x="242" y="400" font-size="11" fill="#4F5D75" text-anchor="middle">8.2 ETH</text>
  <text x="242" y="416" font-size="12" font-weight="700" fill="#1F2D3D" text-anchor="middle">CHF 28,700</text>
  <rect x="192" y="436" width="100" height="28" rx="6" fill="#2A9D8F"/>
  <text x="242" y="454" font-size="11" font-weight="600" fill="white" text-anchor="middle">Trade</text>

  <!-- Actions panel -->
  <rect x="430" y="356" width="340" height="108" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="600" y="382" font-size="12" font-weight="700" fill="#1F2D3D" text-anchor="middle">Common actions — always visible, never intrusive</text>
  <line x1="450" y1="392" x2="750" y2="392" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="450" y="404" width="72" height="28" rx="8" fill="#2A9D8F"/>
  <text x="486" y="422" font-size="11" font-weight="600" fill="white" text-anchor="middle">Trade</text>
  <rect x="534" y="404" width="72" height="28" rx="8" fill="#F3F4F6"/>
  <text x="570" y="422" font-size="11" fill="#4F5D75" text-anchor="middle">Send</text>
  <rect x="618" y="404" width="72" height="28" rx="8" fill="#F3F4F6"/>
  <text x="654" y="422" font-size="11" fill="#4F5D75" text-anchor="middle">Receive</text>
  <rect x="702" y="404" width="72" height="28" rx="8" fill="#FFF2E0"/>
  <text x="738" y="422" font-size="11" fill="#F57C00" text-anchor="middle">Stake</text>
  <text x="450" y="454" font-size="11" fill="#9CA3AF">Transaction history · Fee breakdown · Settlement timing — all surfaced inline</text>
</svg>
