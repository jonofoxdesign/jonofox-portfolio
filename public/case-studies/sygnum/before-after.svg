<svg viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="1200" height="520" fill="#F9FAFB"/>

  <text x="600" y="44" font-size="12" font-weight="600" fill="#9CA3AF" text-anchor="middle" letter-spacing="1.5">SYGNUM — BEFORE &amp; AFTER</text>
  <text x="600" y="64" font-size="13" fill="#4F5D75" text-anchor="middle">For the world's first regulated digital asset bank, clients had to call their account manager just to check their balance.</text>

  <!-- BEFORE -->
  <rect x="60" y="88" width="480" height="400" rx="16" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="300" y="120" font-size="14" font-weight="700" fill="#9CA3AF" text-anchor="middle">BEFORE</text>

  <!-- Flow: Client → Phone → Account Manager → Statement → Balance unknown -->
  <!-- Client -->
  <circle cx="300" cy="178" r="36" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="2"/>
  <text x="300" y="174" font-size="22" text-anchor="middle">👤</text>
  <text x="300" y="196" font-size="11" fill="#4F5D75" text-anchor="middle">Client</text>

  <!-- Arrow down -->
  <line x1="300" y1="216" x2="300" y2="246" stroke="#9CA3AF" stroke-width="2"/>
  <polygon points="295,242 300,254 305,242" fill="#9CA3AF"/>
  <rect x="220" y="256" width="160" height="28" rx="6" fill="#FEF2F2"/>
  <text x="300" y="274" font-size="12" fill="#DC2626" text-anchor="middle">📞  Calls account manager</text>

  <!-- Arrow down -->
  <line x1="300" y1="286" x2="300" y2="316" stroke="#9CA3AF" stroke-width="2"/>
  <polygon points="295,312 300,324 305,312" fill="#9CA3AF"/>

  <!-- Account manager -->
  <rect x="200" y="324" width="200" height="44" rx="10" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="300" y="350" font-size="12" fill="#4F5D75" text-anchor="middle">Account Manager</text>

  <!-- Arrow down -->
  <line x1="300" y1="370" x2="300" y2="400" stroke="#9CA3AF" stroke-width="2"/>
  <polygon points="295,396 300,408 305,396" fill="#9CA3AF"/>
  <text x="300" y="394" font-size="11" fill="#9CA3AF" text-anchor="middle">  manually prepares</text>

  <!-- Statement -->
  <rect x="200" y="408" width="200" height="44" rx="10" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="300" y="434" font-size="12" fill="#4F5D75" text-anchor="middle">📄 Printed statement</text>

  <!-- Pain points -->
  <rect x="80" y="152" width="140" height="80" rx="8" fill="#FEF2F2"/>
  <text x="150" y="176" font-size="11" font-weight="600" fill="#DC2626" text-anchor="middle">Days to get</text>
  <text x="150" y="192" font-size="11" font-weight="600" fill="#DC2626" text-anchor="middle">information</text>
  <text x="150" y="212" font-size="11" fill="#DC2626" text-anchor="middle">Not scalable</text>

  <rect x="420" y="152" width="100" height="80" rx="8" fill="#FEF2F2"/>
  <text x="470" y="176" font-size="11" font-weight="600" fill="#DC2626" text-anchor="middle">No</text>
  <text x="470" y="192" font-size="11" font-weight="600" fill="#DC2626" text-anchor="middle">self-service</text>
  <text x="470" y="212" font-size="11" fill="#DC2626" text-anchor="middle">access</text>

  <!-- Divider arrow -->
  <rect x="556" y="260" width="88" height="36" rx="18" fill="#1F2D3D"/>
  <text x="600" y="282" font-size="20" fill="white" text-anchor="middle">→</text>

  <!-- AFTER -->
  <rect x="660" y="88" width="480" height="400" rx="16" fill="white" stroke="#2A9D8F" stroke-width="2"/>
  <text x="900" y="120" font-size="14" font-weight="700" fill="#2A9D8F" text-anchor="middle">AFTER</text>

  <!-- Client → Dashboard instantly -->
  <circle cx="900" cy="178" r="36" fill="#E0F5F2" stroke="#2A9D8F" stroke-width="2"/>
  <text x="900" y="174" font-size="22" text-anchor="middle">👤</text>
  <text x="900" y="196" font-size="11" fill="#2A9D8F" text-anchor="middle">Client</text>

  <line x1="900" y1="216" x2="900" y2="246" stroke="#2A9D8F" stroke-width="2"/>
  <polygon points="895,242 900,254 905,242" fill="#2A9D8F"/>
  <rect x="800" y="256" width="200" height="28" rx="6" fill="#E0F5F2"/>
  <text x="900" y="274" font-size="12" fill="#2A9D8F" text-anchor="middle">Opens dashboard</text>

  <line x1="900" y1="286" x2="900" y2="316" stroke="#2A9D8F" stroke-width="2"/>
  <polygon points="895,312 900,324 905,312" fill="#2A9D8F"/>

  <!-- Dashboard preview mini -->
  <rect x="720" y="324" width="360" height="128" rx="12" fill="#1F2D3D"/>
  <text x="900" y="350" font-size="11" font-weight="600" fill="#6B7A8D" text-anchor="middle">Total portfolio</text>
  <text x="900" y="376" font-size="28" font-weight="700" fill="white" text-anchor="middle">CHF 4,821,450</text>
  <text x="900" y="396" font-size="12" fill="#2A9D8F" text-anchor="middle">↑ +2.4% today</text>
  <line x1="740" y1="410" x2="1060" y2="410" stroke="#2A3547" stroke-width="1"/>
  <text x="790" y="432" font-size="11" fill="#4F5D75" text-anchor="middle">BTC  12.4</text>
  <text x="900" y="432" font-size="11" fill="#4F5D75" text-anchor="middle">ETH  48.2</text>
  <text x="1010" y="432" font-size="11" fill="#4F5D75" text-anchor="middle">DCHF  200K</text>

  <!-- Benefits -->
  <rect x="680" y="152" width="120" height="80" rx="8" fill="#E0F5F2"/>
  <text x="740" y="176" font-size="11" font-weight="600" fill="#2A9D8F" text-anchor="middle">Instant</text>
  <text x="740" y="192" font-size="11" font-weight="600" fill="#2A9D8F" text-anchor="middle">access</text>
  <text x="740" y="212" font-size="11" fill="#2A9D8F" text-anchor="middle">24/7</text>

  <rect x="1000" y="152" width="120" height="80" rx="8" fill="#E0F5F2"/>
  <text x="1060" y="176" font-size="11" font-weight="600" fill="#2A9D8F" text-anchor="middle">Full</text>
  <text x="1060" y="192" font-size="11" font-weight="600" fill="#2A9D8F" text-anchor="middle">self-service</text>
  <text x="1060" y="212" font-size="11" fill="#2A9D8F" text-anchor="middle">portfolio</text>
</svg>
